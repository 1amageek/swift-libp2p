# Docker Compose topology for swift-libp2p interoperability testing.
#
# This file is the single container runtime description for Go/Rust interop.
# Swift tests may still create per-test containers from these images, but images,
# profiles, and service topology are owned here.

services:
  go-node-1:
    image: go-libp2p-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.go
    ports:
      - "${GO_QUIC_1_PORT:-4001}:4001/udp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["smoke", "quic", "full"]

  go-node-2:
    image: go-libp2p-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.go
    ports:
      - "${GO_QUIC_2_PORT:-4002}:4001/udp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["quic", "full"]

  go-relay:
    image: go-libp2p-relay-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.relay.go
    ports:
      - "${GO_RELAY_PORT:-4003}:4001/udp"
    environment:
      - LISTEN_PORT=4001
      - RELAY_MODE=server
    networks:
      - libp2p-test
    profiles: ["protocol", "relay", "full"]

  go-gossipsub:
    image: go-libp2p-gossipsub-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.gossipsub.go
    ports:
      - "${GO_GOSSIPSUB_PORT:-4004}:4001/udp"
    environment:
      - LISTEN_PORT=4001
      - DEFAULT_TOPIC=test-topic
    networks:
      - libp2p-test
    profiles: ["protocol", "gossipsub", "full"]

  go-kad-1:
    image: go-libp2p-kad-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.kad.go
    ports:
      - "${GO_KAD_1_PORT:-4005}:4001/udp"
    environment:
      - LISTEN_PORT=4001
      - DHT_MODE=server
    networks:
      - libp2p-test
    profiles: ["protocol", "kad", "full"]

  go-kad-2:
    image: go-libp2p-kad-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.kad.go
    ports:
      - "${GO_KAD_2_PORT:-4006}:4001/udp"
    environment:
      - LISTEN_PORT=4001
      - DHT_MODE=server
    networks:
      - libp2p-test
    profiles: ["protocol", "kad", "full"]

  rust-node:
    image: rust-libp2p-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.rust
    ports:
      - "${RUST_QUIC_PORT:-4007}:4001/udp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["smoke", "quic", "full"]

  go-tcp:
    image: go-libp2p-tcp-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.tcp.go
    ports:
      - "${GO_TCP_PORT:-4008}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "tcp", "full"]

  rust-tcp:
    image: rust-libp2p-tcp-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.tcp.rust
    ports:
      - "${RUST_TCP_PORT:-4009}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "tcp", "full"]

  go-ws:
    image: go-libp2p-ws-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.ws.go
    ports:
      - "${GO_WS_PORT:-4010}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "websocket", "full"]

  go-wss:
    image: go-libp2p-wss-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.wss.go
    ports:
      - "${GO_WSS_PORT:-4011}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "websocket", "full"]

  go-noise:
    image: go-libp2p-noise-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.noise.go
    ports:
      - "${GO_NOISE_PORT:-4012}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "noise", "full"]

  go-yamux:
    image: go-libp2p-yamux-test
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.yamux.go
    ports:
      - "${GO_YAMUX_PORT:-4013}:4001/tcp"
    environment:
      - LISTEN_PORT=4001
    networks:
      - libp2p-test
    profiles: ["transport", "yamux", "full"]

networks:
  libp2p-test:
    driver: bridge
