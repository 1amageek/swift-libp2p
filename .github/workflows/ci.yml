name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SWIFT_LIBP2P_DISABLE_BENCHMARKS: "1"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      interop_mode:
        description: Interop suite to run
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - transport
          - protocol
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-gate:
    name: macOS production gate
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Static shutdown guard
        run: scripts/check-sync-shutdown-in-deinit.sh Sources/Transport Tests/Interop/Harnesses

      - name: Production gate
        run: scripts/production-gate.sh --skip-interop --timeout 180 --build-timeout 1200 -- --no-parallel

  linux-build:
    name: Linux build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: swift:6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Build package
        run: swift build --disable-sandbox

  interop:
    name: Go/Rust interop
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INTEROP_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.interop_mode || 'smoke' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Swift
        run: |
          set -euo pipefail

          source /etc/os-release
          case "$VERSION_ID" in
            24.04)
              swift_os="ubuntu24.04"
              swift_platform="ubuntu2404"
              gcc_version="13"
              ;;
            22.04)
              swift_os="ubuntu22.04"
              swift_platform="ubuntu2204"
              gcc_version="12"
              ;;
            *)
              echo "Unsupported Ubuntu version: $VERSION_ID" >&2
              exit 1
              ;;
          esac

          swift_version="6.2"
          swift_release="swift-${swift_version}-RELEASE"
          swift_archive="${swift_release}-${swift_os}.tar.gz"
          swift_url="https://download.swift.org/swift-${swift_version}-release/${swift_platform}/${swift_release}/${swift_archive}"
          install_dir="$RUNNER_TEMP/swift"

          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            clang \
            curl \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libgcc-${gcc_version}-dev \
            libpython3-dev \
            libsqlite3-0 \
            libstdc++-${gcc_version}-dev \
            libxml2-dev \
            libz3-dev \
            pkg-config \
            tzdata \
            unzip \
            zlib1g-dev

          mkdir -p "$install_dir"
          curl --fail --location --show-error "$swift_url" --output "$RUNNER_TEMP/$swift_archive"
          tar --extract --gzip --file "$RUNNER_TEMP/$swift_archive" --directory "$install_dir" --strip-components 1
          echo "$install_dir/usr/bin" >> "$GITHUB_PATH"

      - name: Swift version
        run: swift --version

      - name: Docker versions
        run: |
          docker version
          docker compose version

      - name: Interop preflight
        run: scripts/interop-test.sh preflight

      - name: Interop suite
        run: scripts/interop-test.sh "$INTEROP_MODE" --timeout 1200 --build-timeout 1200 -- --no-parallel

      - name: Upload interop artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: interop-artifacts
          path: .test-artifacts/interop
          if-no-files-found: ignore
